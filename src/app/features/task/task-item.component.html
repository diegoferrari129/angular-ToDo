<div class="container">
    @for (task of tasks$ | async; track task.id) {

    <h4>{{ task.title }}</h4>
    <p>{{ task.description }}</p>

    } @empty {
    <p>Nessun task disponibile.</p>
    }

    <div class="header">
        <h2>Le mie Task</h2>
        <button class="btn-primary" [routerLink]="AppPaths.TASKS.TASKS_NEW">Nuova Task</button>
    </div>

</div>
